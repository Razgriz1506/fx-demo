version: '3.9'

services:
  backend:
    build: ./backend
    container_name: fx_backend
    restart: always
    environment:
      PORT: 4000
      JWT_SECRET: supersecretkey
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: fx_frontend
    restart: always

  nginx:
    image: nginx:latest
    container_name: fx_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
